# ~/.config/hypr/hyprlock.conf

background {
    path = /home/tomas_melone/Pictures/Wallpapers/wallpaper-1.jpg
    blur_size = 4
    blur_passes = 2
    color = 111111
}

input-field {
    monitor = 
    size = 300, 50
    outline_thickness = 2
    dots_center = true
    fade_on_empty = true
    rounding = 8
    position = 0, 200
}

label {
    text = $TIME
    font_size = 36
    position = 0, -100
    color = ffffff
}
